name: Stock Checker

on:
  schedule:
    - cron: "*/5 * * * *"   
  workflow_dispatch:        

jobs:
  check-stock:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    permissions:
      contents: write        

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stock checker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot/main.py

      - name: Commit updated state
        run: |
          git config user.name  "stock-bot"
          git config user.email "stock-bot@users.noreply.github.com"
          git add state/state.json
          git diff --cached --quiet || git commit -m "chore: update state [skip ci]"
          git push